<!-- TODO O RESTO DO SEU CÓDIGO HTML CONTINUA IGUAL --><!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro 📸</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Header */
        .header { text-align: center; background: linear-gradient(135deg, var(--primary), #818cf8); color: white; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .balance { font-size: 38px; font-weight: 600; margin: 10px 0; }
        .summary { display: flex; justify-content: space-between; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; }
        .summary p { font-size: 20px; font-weight: 600; }

        /* Formulários e Inputs */
        h3 { font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;}
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: var(--muted); }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; transition: 0.2s; font-size: 14px;}
        input:focus, select:focus { border-color: var(--primary); }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }

        /* Botões */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }

        /* Câmera e OCR */
        .camera-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #e0e7ff; color: var(--primary); border: 2px dashed var(--primary); padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 500; }
        input[type="file"] { display: none; }
        .ocr-status { font-size: 13px; margin-top: 8px; text-align: center; color: var(--primary); font-weight: 500;}
        .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; display: none; object-fit: contain; background: #f9fafb; }

        /* Gerenciador de Categorias */
        .cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .cat-badge { background: #f3f4f6; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; border: 1px solid #e5e7eb;}
        .cat-actions button { background: none; border: none; cursor: pointer; font-size: 14px; }

        /* Histórico */
        .list { list-style: none; max-height: 350px; overflow-y: auto; }
        .list li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f3f4f6; }
        .list li:last-child { border: none; }
        .tx-info strong { display: block; font-size: 15px; }
        .tx-info small { color: var(--muted); font-size: 12px; }
        .tx-val { font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .val-plus { color: var(--success); }
        .val-minus { color: var(--danger); }
        .img-icon { font-size: 18px; cursor: pointer; }

        .chart-container { height: 250px; position: relative; width: 100%; }

        @media (min-width: 768px) {
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .full-width { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Cabeçalho / Saldo -->
    <div class="card header">
        <h1>Finanças Pro 📸</h1>
        <p>Saldo Atual</p>
        <div class="balance" id="balance">R$ 0,00</div>
        <div class="summary">
            <div>
                <small>Receitas 📈</small>
                <p id="money-plus">R$ 0,00</p>
            </div>
            <div>
                <small>Despesas 📉</small>
                <p id="money-minus">R$ 0,00</p>
            </div>
        </div>
    </div>

    <div class="grid">
        <!-- Formulário e Câmera -->
        <div class="card">
            <h3>Nova Transação</h3>
            <form id="form">
                <div class="form-group">
                    <label for="desc">Descrição</label>
                    <input type="text" id="desc" placeholder="Ex: Mercado Livre" required />
                </div>
                
                <div class="row form-group">
                    <div>
                        <label for="type">Tipo</label>
                        <select id="type">
                            <option value="expense">Despesa 📉</option>
                            <option value="income">Receita 📈</option>
                        </select>
                    </div>
                    <div>
                        <label for="category">Categoria</label>
                        <select id="category" required></select>
                    </div>
                </div>

                <!-- Câmera e OCR -->
                <div class="form-group" id="camera-section">
                    <label class="camera-btn">
                        📷 Tirar Foto da Nota (Auto-preencher)
                        <input type="file" id="receipt-img" accept="image/*" capture="environment" />
                    </label>
                    <div id="ocr-status" class="ocr-status"></div>
                    <img id="img-preview" class="preview-img" alt="Preview da Nota" />
                </div>

                <div class="form-group">
                    <label for="amount">Valor (R$)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required />
                </div>

                <button type="submit" class="btn">Adicionar</button>
            </form>
        </div>

        <!-- Gerenciamento de Categorias -->
        <div class="card">
            <h3>Gerenciar Categorias</h3>
            <div class="row form-group">
                <input type="text" id="new-cat-name" placeholder="Ex: 🛒 Supermercado" />
                <button type="button" class="btn" style="width: auto;" onclick="addCategory()">Criar</button>
            </div>
            <div class="cat-list" id="cat-list">
                <!-- Categorias renderizadas aqui -->
            </div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button class="btn btn-success" onclick="generatePDF()">📄 Exportar Notas (PDF)</button>
        </div>

        <!-- Gráfico -->
        <div class="card full-width">
            <h3>Distribuição (Mês Atual)</h3>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <!-- Histórico -->
        <div class="card full-width">
            <h3>Histórico</h3>
            <ul class="list" id="list"></ul>
        </div>
    </div>
</div>

<script>
    // Configurações e Estado Inicial
    const defaultCategories =['🍔 Alimentação', '🚗 Transporte', '🏠 Moradia', '💊 Saúde', '🎉 Lazer', '💰 Salário', '✨ Outros'];
    
    let categories = JSON.parse(localStorage.getItem('categories')) || defaultCategories;
    let transactions = JSON.parse(localStorage.getItem('transactions')) ||[];
    let currentBase64Image = null;
    let chartInstance = null;

    // Elementos do DOM
    const DOM = {
        balance: document.getElementById('balance'),
        plus: document.getElementById('money-plus'),
        minus: document.getElementById('money-minus'),
        list: document.getElementById('list'),
        form: document.getElementById('form'),
        desc: document.getElementById('desc'),
        amount: document.getElementById('amount'),
        type: document.getElementById('type'),
        category: document.getElementById('category'),
        fileInput: document.getElementById('receipt-img'),
        preview: document.getElementById('img-preview'),
        ocrStatus: document.getElementById('ocr-status'),
        catList: document.getElementById('cat-list')
    };

    const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    // --- INICIALIZAÇÃO ---
    function init() {
        updateCategorySelect();
        renderCategories();
        updateDOM();
        
        // Esconder câmera se for receita
        DOM.type.addEventListener('change', (e) => {
            document.getElementById('camera-section').style.display = e.target.value === 'expense' ? 'block' : 'none';
        });
    }

    // --- GERENCIAMENTO DE CATEGORIAS ---
    function updateCategorySelect() {
        DOM.category.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }

    function renderCategories() {
        DOM.catList.innerHTML = categories.map(cat => `
            <div class="cat-badge">
                ${cat}
                <div class="cat-actions">
                    <button onclick="clearCategoryData('${cat}')" title="Limpar dados desta categoria">🧹</button>
                    <button style="color:red;" onclick="deleteCategory('${cat}')" title="Excluir categoria">✖</button>
                </div>
            </div>
        `).join('');
    }

    function addCategory() {
        const input = document.getElementById('new-cat-name');
        const val = input.value.trim();
        if (val && !categories.includes(val)) {
            categories.push(val);
            saveData();
            updateCategorySelect();
            renderCategories();
            input.value = '';
        }
    }

    function deleteCategory(cat) {
        if(confirm(`Excluir a categoria "${cat}"? (Isso não apaga as transações existentes)`)) {
            categories = categories.filter(c => c !== cat);
            saveData();
            updateCategorySelect();
            renderCategories();
        }
    }

    function clearCategoryData(cat) {
        if(confirm(`CUIDADO: Isso vai apagar TODAS as despesas/receitas de "${cat}". Deseja continuar?`)) {
            transactions = transactions.filter(t => t.category !== cat);
            saveData();
            updateDOM();
        }
    }

    // --- CÂMERA E OCR (Leitura da Nota) ---
    DOM.fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        DOM.ocrStatus.innerText = "⏳ Comprimindo imagem...";
        
        try {
            // Comprime a imagem em canvas para não travar o LocalStorage (Limite de 5MB)
            currentBase64Image = await compressImage(file);
            DOM.preview.src = currentBase64Image;
            DOM.preview.style.display = 'block';

            DOM.ocrStatus.innerText = "🤖 Lendo valor da nota com IA (Aguarde...)";
            
            // Tesseract OCR
            const result = await Tesseract.recognize(currentBase64Image, 'por');
            const text = result.data.text;
            
            // Regex para extrair o maior valor (Geralmente é o total da nota)
            const amounts = text.match(/\d{1,4}(?:[.,]\d{2})/g);
            
            if (amounts && amounts.length > 0) {
                // Converte todas as capturas para números reais e pega o maior
                const numericAmounts = amounts.map(val => parseFloat(val.replace(',', '.')));
                const total = Math.max(...numericAmounts);
                
                DOM.amount.value = total.toFixed(2);
                DOM.ocrStatus.innerText = "✅ Valor encontrado e preenchido!";
                DOM.ocrStatus.style.color = "var(--success)";
            } else {
                DOM.ocrStatus.innerText = "⚠️ Não achamos o total. Digite manualmente.";
                DOM.ocrStatus.style.color = "var(--danger)";
            }
        } catch (error) {
            console.error(error);
            DOM.ocrStatus.innerText = "❌ Erro ao ler a nota.";
        }
    });

    // Função de compressão de Imagem
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 600; // Reduz a resolução
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    // Retorna em JPEG com 60% de qualidade
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    // --- ADICIONAR TRANSAÇÃO ---
    DOM.form.addEventListener('submit', (e) => {
        e.preventDefault();

        const transaction = {
            id: Date.now(),
            desc: DOM.desc.value,
            amount: parseFloat(DOM.amount.value),
            type: DOM.type.value,
            category: DOM.category.value,
            date: new Date().toISOString(),
            image: DOM.type.value === 'expense' ? currentBase64Image : null
        };

        try {
            transactions.push(transaction);
            saveData();
            updateDOM();
            
            // Resetar Form
            DOM.form.reset();
            currentBase64Image = null;
            DOM.preview.style.display = 'none';
            DOM.ocrStatus.innerText = "";
            DOM.desc.focus();
        } catch (error) {
            alert("A memória do navegador está cheia! Você salvou muitas fotos. Exporte os dados e limpe o histórico.");
            transactions.pop(); // Remove a que falhou
        }
    });

    // --- RENDERIZAÇÃO E GRÁFICOS ---
    function updateDOM() {
        DOM.list.innerHTML = '';
        
        // Separa valores
        let income = 0; let expense = 0;

        transactions.sort((a,b) => b.id - a.id).forEach(tx => {
            const isInc = tx.type === 'income';
            isInc ? income += tx.amount : expense += tx.amount;

            const li = document.createElement('li');
            li.innerHTML = `
                <div class="tx-info">
                    <strong>${tx.desc}</strong>
                    <small>${tx.category} • ${new Date(tx.date).toLocaleDateString()}</small>
                </div>
                <div class="tx-val">
                    ${tx.image ? `<span class="img-icon" title="Tem foto da nota" onclick="viewImage('${tx.id}')">🖼️</span>` : ''}
                    <span class="${isInc ? 'val-plus' : 'val-minus'}">
                        ${isInc ? '+' : '-'} ${formatter.format(tx.amount)}
                    </span>
                    <button class="btn btn-danger" style="padding: 5px 10px; width:auto;" onclick="removeTx(${tx.id})">🗑</button>
                </div>
            `;
            DOM.list.appendChild(li);
        });

        const total = income - expense;
        DOM.balance.innerText = formatter.format(total);
        DOM.plus.innerText = formatter.format(income);
        DOM.minus.innerText = formatter.format(expense);

        updateChart();
    }

    function removeTx(id) {
        transactions = transactions.filter(t => t.id !== id);
        saveData();
        updateDOM();
    }

    function viewImage(id) {
        const tx = transactions.find(t => t.id == id);
        if(tx && tx.image) {
            const w = window.open("");
            w.document.write(`<img src="${tx.image}" style="max-width:100%;">`);
        }
    }

    function saveData() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
        localStorage.setItem('categories', JSON.stringify(categories));
    }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const currentMonth = new Date().getMonth();
        
        const expenses = transactions.filter(t => t.type === 'expense' && new Date(t.date).getMonth() === currentMonth);
        const dataMap = {};
        expenses.forEach(t => dataMap[t.category] = (dataMap[t.category] || 0) + t.amount);

        const labels = Object.keys(dataMap);
        const data = Object.values(dataMap);

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels.length ? labels :['Vazio'],
                datasets: [{
                    data: data.length ? data : [1],
                    backgroundColor: data.length ?['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'] : ['#e5e7eb'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {font: {family: 'Poppins'}} } } }
        });
    }

    // --- GERAÇÃO DE PDF (jsPDF) ---
    async function generatePDF() {
        const txsWithImages = transactions.filter(t => t.image);
        if (txsWithImages.length === 0) {
            alert("Você não tem nenhuma despesa com nota fiscal salva em foto!");
            return;
        }

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        for (let i = 0; i < txsWithImages.length; i++) {
            const tx = txsWithImages[i];
            if (i > 0) pdf.addPage();

            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(22);
            pdf.text("Relatório de Nota Fiscal", 20, 20);
            
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(14);
            pdf.text(`Descrição: ${tx.desc}`, 20, 35);
            pdf.text(`Categoria: ${tx.category}`, 20, 45);
            pdf.text(`Data: ${new Date(tx.date).toLocaleDateString('pt-BR')}`, 20, 55);
            
            pdf.setFont("helvetica", "bold");
            pdf.setTextColor(239, 68, 68); // Cor vermelha
            pdf.text(`Valor Total: ${formatter.format(tx.amount)}`, 20, 65);

            // Adiciona Imagem
            try {
                // A imagem é base64 (JPEG)
                pdf.addImage(tx.image, 'JPEG', 20, 80, 160, 200, undefined, 'FAST');
            } catch (err) {
                console.error("Erro ao adicionar imagem no PDF", err);
            }
        }

        pdf.save('Minhas_Notas_Fiscais.pdf');
    }

    // Start App
    init();
</script>
</body>
</html>
