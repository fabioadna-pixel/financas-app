<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pro</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_-NgzbE7km9oPGDkEUzTAtUYnIqWdIY",
  authDomain: "financas-app-521a6.firebaseapp.com",
  projectId: "financas-app-521a6",
  storageBucket: "financas-app-521a6.firebasestorage.app",
  messagingSenderId: "556906717820",
  appId: "1:556906717820:web:8b0c1e145ec21685d3dff9",
  measurementId: "G-NM3PGQZ9WJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let userId=null;

window.login = async function(){

const provider = new GoogleAuthProvider();

const result = await signInWithPopup(auth,provider);

userId=result.user.uid;

document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";

loadTransactions();

}

async function addTransaction(){

let desc=document.getElementById("desc").value;

let amount=document.getElementById("amount").value;

await addDoc(collection(db,"transactions"),{

user:userId,

desc:desc,

amount:amount,

date:new Date()

});

loadTransactions();

}

async function loadTransactions(){

const q=query(collection(db,"transactions"),where("user","==",userId));

const querySnapshot=await getDocs(q);

let list=document.getElementById("list");

list.innerHTML="";

querySnapshot.forEach(doc=>{

let data=doc.data();

let li=document.createElement("li");

li.innerText=data.desc+" - R$ "+data.amount;

list.appendChild(li);

});

}

window.addTransaction=addTransaction;

</script>

<style>

body{

font-family:Arial;

background:#f3f4f6;

padding:40px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

max-width:500px;

margin:auto;

}

button{

background:#4f46e5;

color:white;

padding:10px;

border:none;

border-radius:8px;

cursor:pointer;

}

input{

width:100%;

padding:10px;

margin-bottom:10px;

}

</style>

</head>

<body>

<div id="login" class="card">

<h2>Entrar</h2>

<button onclick="login()">Entrar com Google</button>

</div>

<div id="app" class="card" style="display:none">

<h2>Nova despesa</h2>

<input id="desc" placeholder="Descrição">

<input id="amount" placeholder="Valor">

<button onclick="addTransaction()">Salvar</button>

<h3>Histórico</h3>

<ul id="list"></ul>

</div>

</body>
</html>
