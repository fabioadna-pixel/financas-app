<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Inteligente</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F3F4F6;
            --card: #FFFFFF;
            --text: #1F2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 20px; }
        
        /* Dashboard Cards */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { font-size: 14px; color: #6B7280; text-transform: uppercase; }
        .card h2 { font-size: 28px; margin-top: 10px; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        /* Form e Layout Principal */
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }

        .form-section, .chart-section { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, button { padding: 12px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 16px; }
        
        .btn-primary { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary:hover { background: #4338CA; }
        .btn-ocr { background: #374151; color: white; border: none; cursor: pointer; }
        
        /* Histórico */
        .history-section { background: var(--card); padding: 20px; border-radius: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E5E7EB; }
        
        /* Ações Extras */
        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-whatsapp { background: #25D366; }
        .btn-sync { background: #F59E0B; }

        #loading { display: none; color: var(--primary); font-weight: bold; font-size: 14px; }
        .img-preview { max-width: 100%; height: 100px; object-fit: cover; display: none; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>💸 Controle Financeiro</h1>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>Saldo Atual</h3>
            <h2 id="total-balance">R$ 0,00</h2>
        </div>
        <div class="card">
            <h3>Receitas</h3>
            <h2 id="total-income" class="text-success">R$ 0,00</h2>
        </div>
        <div class="card">
            <h3>Despesas</h3>
            <h2 id="total-expense" class="text-danger">R$ 0,00</h2>
        </div>
    </div>

    <div class="main-content">
        <!-- Formulário -->
        <div class="form-section">
            <h2>Nova Transação</h2><br>
            <form id="finance-form">
                <input type="text" id="desc" placeholder="Descrição da compra/receita" required>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="amount" placeholder="Valor (R$)" step="0.01" required style="flex: 1;">
                    <select id="type" style="flex: 1;" onchange="updateCategories()">
                        <option value="expense">Despesa</option>
                        <option value="income">Receita</option>
                    </select>
                </div>

                <select id="category" required>
                    <!-- Categorias geradas dinamicamente -->
                </select>

                <input type="date" id="date" required>

                <div style="border: 1px dashed #ccc; padding: 10px; border-radius: 6px;">
                    <label style="font-size: 14px; color: #666;">📸 Tirar foto da nota (Opcional)</label>
                    <input type="file" id="receiptFile" accept="image/*" capture="environment" style="width: 100%; margin-top: 5px;">
                    <button type="button" class="btn-ocr" onclick="extractOCR()" style="width: 100%; margin-top: 10px;">🔍 Ler Valor da Nota</button>
                    <p id="loading">Processando imagem... (Pode demorar uns segundos)</p>
                    <img id="img-preview" class="img-preview">
                </div>

                <button type="submit" class="btn-primary">Adicionar Transação</button>
            </form>
        </div>

        <!-- Gráfico -->
        <div class="chart-section">
            <h2>Despesas por Categoria</h2>
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <!-- Histórico -->
    <div class="history-section">
        <h2>Histórico de Transações</h2>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Nota</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="history-list"></tbody>
        </table>
    </div>

    <!-- Ações Inferiores -->
    <div class="actions">
        <button class="btn-action btn-whatsapp" onclick="generateAndSharePDF()">📤 Enviar Relatório e Notas (WhatsApp)</button>
        <button class="btn-action btn-sync" onclick="exportData()">🔄 Compartilhar / Exportar Dados</button>
        <button class="btn-action btn-sync" onclick="importData()">📥 Importar Dados</button>
    </div>
</div>

<script>
    // --- INICIALIZAÇÃO E DADOS ---
    let transactions = JSON.parse(localStorage.getItem('finances')) ||[];
    let currentReceiptBase64 = null;
    let chartInstance = null;

    const categories = {
        expense:['Alimentação', 'Transporte', 'Moradia', 'Lazer', 'Saúde', 'Outros'],
        income:['Salário', 'Freelance', 'Investimentos', 'Outros']
    };

    // Atualiza opções de categoria baseado no tipo
    function updateCategories() {
        const type = document.getElementById('type').value;
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = '';
        categories[type].forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat;
            catSelect.appendChild(opt);
        });
    }

    document.getElementById('date').valueAsDate = new Date();
    updateCategories();

    // --- LÓGICA DO FORMULÁRIO ---
    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const transaction = {
            id: Date.now(),
            desc: document.getElementById('desc').value,
            amount: parseFloat(document.getElementById('amount').value),
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            date: document.getElementById('date').value,
            receipt: currentReceiptBase64
        };

        transactions.push(transaction);
        saveData();
        updateUI();
        
        // Resetar form (menos a data)
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('receiptFile').value = '';
        currentReceiptBase64 = null;
        document.getElementById('img-preview').style.display = 'none';
    });

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        saveData();
        updateUI();
    }

    function saveData() {
        // Devido ao limite de 5MB do localStorage, salvamos imagens muito comprimidas.
        localStorage.setItem('finances', JSON.stringify(transactions));
    }

    // --- COMPRESSÃO DE IMAGEM ---
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; // Reduz tamanho para não estourar o limite do navegador
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.6)); // Qualidade 60%
            }
        }
    }

    document.getElementById('receiptFile').addEventListener('change', function(e) {
        if(e.target.files[0]) {
            compressImage(e.target.files[0], (base64) => {
                currentReceiptBase64 = base64;
                const imgPreview = document.getElementById('img-preview');
                imgPreview.src = base64;
                imgPreview.style.display = 'block';
            });
        }
    });

    // --- LEITURA DE NOTA (OCR) ---
    async function extractOCR() {
        const fileInput = document.getElementById('receiptFile');
        if (!fileInput.files[0]) return alert('Selecione ou tire a foto da nota primeiro!');
        
        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const worker = await Tesseract.createWorker('por');
            const ret = await worker.recognize(fileInput.files[0]);
            const text = ret.data.text;
            
            // Procura padrões de dinheiro (ex: 15,99 / 1.000,50)
            const regex = /\b\d{1,3}(?:\.\d{3})*(?:,\d{2})\b/g;
            const matches = text.match(regex);
            
            if (matches) {
                // Converte para float e pega o maior valor (geralmente o Total)
                const values = matches.map(m => parseFloat(m.replace(/\./g, '').replace(',', '.')));
                const max = Math.max(...values);
                document.getElementById('amount').value = max.toFixed(2);
                alert('Valor detectado: R$ ' + max.toFixed(2).replace('.', ','));
            } else {
                alert('Não foi possível encontrar o valor total na nota automaticamente. Verifique se a foto está legível.');
            }
            await worker.terminate();
        } catch (error) {
            alert('Erro ao processar imagem.');
            console.error(error);
        } finally {
            loading.style.display = 'none';
        }
    }

    // --- ATUALIZAÇÃO DE INTERFACE ---
    function updateUI() {
        const historyList = document.getElementById('history-list');
        historyList.innerHTML = '';
        
        let income = 0, expense = 0;
        let expensesByCategory = {};

        // Ordenar por data (mais recente primeiro)
        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));

        sorted.forEach(t => {
            // Cálculos
            if(t.type === 'income') income += t.amount;
            else {
                expense += t.amount;
                expensesByCategory[t.category] = (expensesByCategory[t.category] || 0) + t.amount;
            }

            // Tabela
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${new Date(t.date).toLocaleDateString('pt-BR')}</td>
                <td>${t.desc}</td>
                <td>${t.category}</td>
                <td class="${t.type === 'income' ? 'text-success' : 'text-danger'}">
                    R$ ${t.amount.toFixed(2).replace('.', ',')}
                </td>
                <td>${t.receipt ? '🖼️ Sim' : '❌ Não'}</td>
                <td><button onclick="deleteTransaction(${t.id})" style="color:red; cursor:pointer; background:none; border:none; font-weight:bold;">X</button></td>
            `;
            historyList.appendChild(tr);
        });

        document.getElementById('total-income').innerText = `R$ ${income.toFixed(2).replace('.', ',')}`;
        document.getElementById('total-expense').innerText = `R$ ${expense.toFixed(2).replace('.', ',')}`;
        document.getElementById('total-balance').innerText = `R$ ${(income - expense).toFixed(2).replace('.', ',')}`;

        updateChart(expensesByCategory);
    }

    // --- GRÁFICO (Chart.js) ---
    function updateChart(dataObj) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        const labels = Object.keys(dataObj);
        const data = Object.values(dataObj);

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets:[{
                    data: data,
                    backgroundColor:['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // --- GERAR PDF E ENVIAR PARA WHATSAPP ---
    async function generateAndSharePDF() {
        if(transactions.length === 0) return alert('Nenhuma transação para exportar.');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18);
        doc.text("Relatório Financeiro", 14, 20);
        
        // Tabela de Transações
        const tableData = transactions.map(t =>[
            new Date(t.date).toLocaleDateString('pt-BR'),
            t.desc,
            t.category,
            t.type === 'income' ? 'Receita' : 'Despesa',
            `R$ ${t.amount.toFixed(2).replace('.', ',')}`
        ]);

        doc.autoTable({
            startY: 30,
            head: [['Data', 'Descrição', 'Categoria', 'Tipo', 'Valor']],
            body: tableData,
        });

        // Adicionar Fotos das Notas no final do PDF
        const withReceipts = transactions.filter(t => t.receipt);
        if(withReceipts.length > 0) {
            doc.addPage();
            doc.text("Fotos das Notas Anexadas", 14, 20);
            let y = 30;
            
            withReceipts.forEach((t, index) => {
                if(y > 250) { doc.addPage(); y = 20; }
                doc.setFontSize(12);
                doc.text(`Nota: ${t.desc} - R$ ${t.amount.toFixed(2)} (${t.category})`, 14, y);
                doc.addImage(t.receipt, 'JPEG', 14, y + 5, 80, 0); // Ajusta proporção automática
                y += 100; // Espaço para a próxima
            });
        }

        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], "Relatorio_Financeiro.pdf", { type: "application/pdf" });

        // Tentar Compartilhar via Web Share API (WhatsApp etc) - Funciona em mobile
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Relatório Financeiro',
                    text: 'Segue o relatório financeiro com as notas fiscais anexadas por categoria.'
                });
            } catch (err) { console.log('Compartilhamento cancelado', err); }
        } else {
            // Fallback para PC: Faz o download e abre link do web.whatsapp
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Relatorio_Financeiro.pdf";
            a.click();
            
            setTimeout(() => {
                const msg = encodeURIComponent("Aqui está meu relatório financeiro. Acabei de baixar o PDF!");
                window.open(`https://api.whatsapp.com/send?text=${msg}`, "_blank");
            }, 1000);
        }
    }

    // --- COMPARTILHAMENTO / ACESSO PARA OUTRA PESSOA ---
    function exportData() {
        const dataStr = JSON.stringify(transactions);
        const encoded = btoa(encodeURIComponent(dataStr)); // Codifica em Base64
        navigator.clipboard.writeText(encoded).then(() => {
            alert("Código de sincronização copiado!\nEnvie este código no WhatsApp da outra pessoa para ela clicar em 'Importar'.");
        }).catch(() => {
            prompt("Copie o código abaixo e envie para a outra pessoa:", encoded);
        });
    }

    function importData() {
        const code = prompt("Cole aqui o código de sincronização que a outra pessoa te enviou:");
        if(!code) return;
        try {
            const decoded = decodeURIComponent(atob(code));
            const importedTransactions = JSON.parse(decoded);
            if(Array.isArray(importedTransactions)) {
                transactions = importedTransactions;
                saveData();
                updateUI();
                alert("Dados importados com sucesso!");
            }
        } catch(e) {
            alert("Código inválido!");
        }
    }

    // Inicializa a tela
    updateUI();
</script>

</body>
</html>
