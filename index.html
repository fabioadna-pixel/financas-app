<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fb;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header{
background:linear-gradient(135deg,#5b5bd6,#7f8cff);
color:white;
padding:40px;
text-align:center;
border-radius:0 0 20px 20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#5b5bd6;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.login{
text-align:center;
margin-top:100px;
}

</style>
</head>

<body>

<div id="login" class="login">
<h2>Entrar</h2>
<button onclick="login()">Entrar com Google</button>
</div>

<div id="app" style="display:none">

<div class="header">
<h1>Finanças Pro</h1>
<h2 id="saldo">R$ 0</h2>
</div>

<div class="container">

<div class="card">

<h3>Nova Transação</h3>

<input id="descricao" placeholder="Descrição">

<select id="tipo">
<option value="despesa">Despesa</option>
<option value="receita">Receita</option>
</select>

<input id="valor" placeholder="Valor">

<button onclick="salvar()">Adicionar</button>

</div>

<div class="card">

<h3>Histórico</h3>

<div id="lista"></div>

</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAg_-NgzbE7km9oPGDkEUzTAtUYnIqWdIY",
authDomain: "financas-app-521a6.firebaseapp.com",
projectId: "financas-app-521a6",
storageBucket: "financas-app-521a6.appspot.com",
messagingSenderId: "556906717820",
appId: "1:556906717820:web:8b0c1e145ec21685d3dff9"
};

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()
const db = firebase.firestore()

let userId = null

function login(){

const provider = new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

function logout(){

auth.signOut()

}

auth.onAuthStateChanged(user=>{

if(user){

userId = user.uid

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

carregar()

}else{

document.getElementById("login").style.display="block"
document.getElementById("app").style.display="none"

}

})

function salvar(){

const descricao = document.getElementById("descricao").value
const tipo = document.getElementById("tipo").value
const valor = parseFloat(document.getElementById("valor").value)

db.collection("usuarios")
.doc(userId)
.collection("transacoes")
.add({
descricao,
tipo,
valor,
data:Date.now()
})

document.getElementById("descricao").value=""
document.getElementById("valor").value=""

}

function carregar(){

db.collection("usuarios")
.doc(userId)
.collection("transacoes")
.orderBy("data","desc")
.onSnapshot(snapshot=>{

let lista = document.getElementById("lista")
lista.innerHTML=""

let saldo=0

snapshot.forEach(doc=>{

const t = doc.data()

if(t.tipo==="receita"){
saldo += t.valor
}else{
saldo -= t.valor
}

lista.innerHTML += `
<div class="item">
<span>${t.descricao}</span>
<span>R$ ${t.valor}</span>
</div>
`

})

document.getElementById("saldo").innerText = "R$ " + saldo.toFixed(2)

})

}

</script>

</body>
</html>
