<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finanças Pro</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAg_-NgzbE7km9oPGDkEUzTAtUYnIqWdIY",
authDomain: "financas-app-521a6.firebaseapp.com",
projectId: "financas-app-521a6",
storageBucket: "financas-app-521a6.firebasestorage.app",
messagingSenderId: "556906717820",
appId: "1:556906717820:web:8b0c1e145ec21685d3dff9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

window.login = async function(){

await signInWithPopup(auth, provider);

}

window.logout = async function(){

await signOut(auth)

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadTransactions(user)

}else{

document.getElementById("login").style.display="block"
document.getElementById("app").style.display="none"

}

})

window.save = async function(){

let desc=document.getElementById("desc").value
let value=document.getElementById("value").value

let user=auth.currentUser

await addDoc(collection(db,"transactions"),{

uid:user.uid,
desc:desc,
value:value,
date:Date.now()

})

loadTransactions(user)

}

async function loadTransactions(user){

let list=document.getElementById("history")

list.innerHTML=""

const q=query(collection(db,"transactions"),where("uid","==",user.uid))

const querySnapshot=await getDocs(q)

querySnapshot.forEach((doc)=>{

let data=doc.data()

let li=document.createElement("li")

li.innerText=data.desc+" - R$ "+data.value

list.appendChild(li)

})

}

</script>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

ul{
margin-top:20px;
}

</style>

</head>

<body>

<div id="login" class="card">

<h2>Entrar</h2>

<button onclick="login()">Entrar com Google</button>

</div>

<div id="app" class="card" style="display:none">

<h2>Nova despesa</h2>

<input id="desc" placeholder="Descrição">

<input id="value" placeholder="Valor">

<button onclick="save()">Salvar</button>

<button onclick="logout()">Sair</button>

<h3>Histórico</h3>

<ul id="history"></ul>

</div>

</body>
</html>
